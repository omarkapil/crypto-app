<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>choose your crypto method</h1>
        <div class="crypto-buttons">
            {% for method in methods %}
            <button 
                class="method-btn" 
                data-method="{{ method }}" 
                onclick="openModal('{{ method }}')">
                {{ method }}
            </button>
            {% endfor %}
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title"></h2>
            
            <label for="input-text"> your text please :</label>
            <textarea id="input-text" rows="5"></textarea>
            
            <button id="process-btn"> lets go </button>
            
            <div id="result-area" class="result-area">
                <p><strong>your cipher text is :</strong></p>
                <textarea id="output-text" rows="5" readonly></textarea>
                <div id="status-message" class="status-message"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
